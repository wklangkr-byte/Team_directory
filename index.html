<html lang="th">
<head>

<title>Team Directory System</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<!-- ════════════════════════════════════════════════════════════════════
  🔥 FIREBASE — Realtime Database (รูปโปรไฟล์เก็บเป็น base64 ใน DB)
  ✅ Config ตั้งค่าเรียบร้อยแล้ว พร้อม Sync ทุกอุปกรณ์
  ════════════════════════════════════════════════════════════════════ -->
<script type="module">
import { initializeApp }                                       from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, remove }         from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ✅ Firebase Config — team-directory-soa
const firebaseConfig = {
  apiKey:            "AIzaSyBt0jaIW9xXNpGOAmTX_RigB2J45RONEPs",
  authDomain:        "team-directory-soa.firebaseapp.com",
  databaseURL:       "https://team-directory-soa-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "team-directory-soa",
  storageBucket:     "team-directory-soa.firebasestorage.app",
  messagingSenderId: "180704913393",
  appId:             "1:180704913393:web:1440253ed548e4bbcfc650",
  measurementId:     "G-0R0LJ7MY9Y"
};

try {
  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  // helper: แทน . ใน key ด้วย _dot_
  const safeKey = k => k.replace(/\./g, '_dot_');

  window._fb = {
    db,

    async getMembers() {
      const snap = await get(ref(db, 'members'));
      if (!snap.exists()) return [];
      return Object.values(snap.val());
    },

    async setMember(id, data) {
      await set(ref(db, 'members/' + id), data);
    },

    async deleteMember(id) {
      await remove(ref(db, 'members/' + id));
    },

    onMembers(callback) {
      return onValue(ref(db, 'members'), snap => {
        if (!snap.exists()) { callback([]); return; }
        const arr = Object.values(snap.val());
        arr.sort((a,b) => String(a.id).localeCompare(String(b.id)));
        callback(arr);
      });
    },

    // avatar เก็บเป็น base64 string ใน Realtime DB โดยตรง
    async getUserAvatar(username) {
      const snap = await get(ref(db, 'users/' + safeKey(username) + '/avatar'));
      return snap.exists() ? snap.val() : null;
    },
    async setUserAvatar(username, base64) {
      await set(ref(db, 'users/' + safeKey(username) + '/avatar'), base64);
    },
    onUserAvatar(username, callback) {
      return onValue(ref(db, 'users/' + safeKey(username) + '/avatar'), snap => {
        callback(snap.exists() ? snap.val() : null);
      });
    },

    // member avatar เก็บเป็น base64 ใน members node
    async setMemberAvatar(memberId, base64) {
      await set(ref(db, 'members/' + memberId + '/avatar'), base64);
    }
  };

  window._fbReady = true;
  console.log("✅ Firebase Realtime Database เชื่อมต่อสำเร็จ");
} catch(e) {
  console.error("Firebase init error:", e);
  window._fbReady = false;
}
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Noto+Sans+Thai:wght@300;400;500;600;700;800;900&display=swap');

:root {
  /* Light Theme */
  --bg: #f4f6fb;
  --bg2: #ffffff;
  --bg3: #eef1f8;
  --card: #ffffff;
  --card-border: #e2e8f4;
  --card-shadow: 0 2px 12px rgba(80,100,160,0.08), 0 1px 3px rgba(80,100,160,0.06);

  /* Accent Colors */
  --accent: #3b7aff;
  --accent2: #6c5ce7;
  --accent-soft: rgba(59,122,255,0.1);
  --orange: #f97316;
  --green: #10b981;

  /* Text */
  --text: #1a2340;
  --text2: #6274a0;
  --text3: #a0aec0;

  /* Regional Badges */
  --r1: #ef4444;
  --r2: #3b7aff;
  --r3: #10b981;
  --r4: #f59e0b;

  --font: 'Noto Sans Thai', 'Sarabun', sans-serif;
  --radius: 16px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overflow-x: hidden; }
.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; flex-direction: column; }

/* ── LOGIN ── */
#loginScreen {
  background: linear-gradient(145deg, #eef2ff 0%, #f4f6fb 40%, #fdf4ff 100%);
  align-items: center; justify-content: center; padding: 24px; position: relative; overflow: hidden;
}
#loginScreen::before {
  content: ''; position: absolute; width: 500px; height: 500px; border-radius: 50%;
  background: radial-gradient(circle, rgba(59,122,255,0.12) 0%, transparent 70%);
  top: -150px; right: -100px; pointer-events: none;
}
#loginScreen::after {
  content: ''; position: absolute; width: 400px; height: 400px; border-radius: 50%;
  background: radial-gradient(circle, rgba(108,92,231,0.1) 0%, transparent 70%);
  bottom: -100px; left: -80px; pointer-events: none;
}
.login-card {
  width: 100%; max-width: 400px;
  background: rgba(255,255,255,0.85);
  border: 1px solid rgba(255,255,255,0.9);
  border-radius: 28px;
  padding: 44px 36px;
  backdrop-filter: blur(20px);
  box-shadow: 0 20px 60px rgba(59,80,160,0.12), 0 4px 16px rgba(59,80,160,0.08), inset 0 1px 0 rgba(255,255,255,1);
  position: relative; z-index: 1;
}
.login-logo {
  width: 76px; height: 76px; border-radius: 22px; margin: 0 auto 20px;
  background: linear-gradient(135deg, #3b7aff, #6c5ce7);
  display: flex; align-items: center; justify-content: center; font-size: 34px;
  box-shadow: 0 8px 28px rgba(59,122,255,0.35), 0 2px 8px rgba(59,122,255,0.2);
}
.login-title { font-size: 23px; font-weight: 800; text-align: center; margin-bottom: 4px; color: var(--text); letter-spacing: -0.3px; }
.login-sub { font-size: 13px; color: var(--text2); text-align: center; margin-bottom: 32px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 11px; font-weight: 700; color: var(--text2); margin-bottom: 6px; letter-spacing: 0.8px; text-transform: uppercase; }
.form-group input {
  width: 100%; padding: 13px 16px; border-radius: 13px;
  border: 1.5px solid var(--card-border);
  background: var(--bg); color: var(--text); font-size: 15px; font-family: var(--font);
  outline: none; transition: border-color .2s, box-shadow .2s;
  box-shadow: inset 0 1px 3px rgba(0,0,0,0.04);
}
.form-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,122,255,0.12); }
.btn-login {
  width: 100%; padding: 14px; border-radius: 14px; border: none;
  background: linear-gradient(135deg, #3b7aff, #6c5ce7);
  color: #fff; font-weight: 700; font-size: 15px; cursor: pointer; font-family: var(--font); margin-top: 8px;
  box-shadow: 0 4px 20px rgba(59,122,255,0.35), 0 1px 4px rgba(59,122,255,0.2);
  transition: opacity .2s, transform .1s, box-shadow .2s;
}
.btn-login:hover { box-shadow: 0 6px 28px rgba(59,122,255,0.45); }
.btn-login:active { transform: scale(0.98); opacity: 0.9; }
.login-error {
  background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25);
  border-radius: 11px; padding: 10px 14px; font-size: 13px; color: #ef4444; margin-top: 12px; display: none;
}
.firebase-notice {
  background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.25);
  border-radius: 11px; padding: 10px 14px; font-size: 12px; color: #d97706; margin-top: 12px; display: none; line-height: 1.6;
}
.firebase-notice a { color: #d97706; }

/* ── APP ── */
#appScreen { background: var(--bg); }
.topbar {
  background: rgba(255,255,255,0.92); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--card-border);
  padding: 14px 20px 12px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100; flex-shrink: 0;
  box-shadow: 0 1px 8px rgba(80,100,160,0.07);
}
.topbar-left { display: flex; flex-direction: column; gap: 1px; }
.topbar-title { font-size: 17px; font-weight: 800; letter-spacing: -0.2px; color: var(--text); }
.topbar-sub { font-size: 11px; color: var(--text2); }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.btn-add {
  background: linear-gradient(135deg, #3b7aff, #6c5ce7); border: none;
  border-radius: 20px; color: #fff; font-weight: 700; font-size: 12px; padding: 7px 15px;
  cursor: pointer; font-family: var(--font); display: flex; align-items: center; gap: 4px;
  box-shadow: 0 2px 10px rgba(59,122,255,0.3);
}
.avatar-sm { width: 36px; height: 36px; border-radius: 50%; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; color: #fff; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
.avatar-sm img { width: 100%; height: 100%; object-fit: cover; }

/* ── CONTENT ── */
.content { flex: 1; overflow-y: auto; padding: 16px 16px 80px; -webkit-overflow-scrolling: touch; }
.content::-webkit-scrollbar { display: none; }

/* ── SEARCH ── */
.search-wrap {
  background: var(--card); border: 1.5px solid var(--card-border);
  border-radius: 14px; padding: 11px 15px;
  display: flex; align-items: center; gap: 9px; margin-bottom: 12px;
  box-shadow: var(--card-shadow);
  transition: border-color .2s, box-shadow .2s;
}
.search-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,122,255,0.1), var(--card-shadow); }
.search-wrap svg { opacity: .4; flex-shrink: 0; color: var(--text2); }
.search-wrap input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-size: 14px; font-family: var(--font); }
.search-wrap input::placeholder { color: var(--text3); }

/* ── FILTER PILLS ── */
.filter-pills { display: flex; gap: 7px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 14px; }
.filter-pills::-webkit-scrollbar { display: none; }
.pill {
  padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: 700; cursor: pointer;
  white-space: nowrap; border: 1.5px solid var(--card-border);
  background: var(--card); color: var(--text2); transition: all .2s; font-family: var(--font);
  box-shadow: 0 1px 4px rgba(80,100,160,0.06);
}
.pill.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); box-shadow: 0 2px 8px rgba(59,122,255,0.15); }

/* ── STATS ── */
.stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 16px; }
.stat-card {
  background: var(--card); border: 1px solid var(--card-border);
  border-radius: 14px; padding: 11px 6px; text-align: center;
  box-shadow: var(--card-shadow);
  transition: transform .15s, box-shadow .15s;
}
.stat-card:active { transform: scale(0.97); }
.stat-icon { font-size: 18px; margin-bottom: 2px; }
.stat-val { font-size: 21px; font-weight: 900; color: var(--accent); line-height: 1.1; }
.stat-lbl { font-size: 9px; color: var(--text3); margin-top: 2px; line-height: 1.2; }

/* ── MEMBER CARD ── */
.member-card {
  background: var(--card); border: 1px solid var(--card-border);
  border-radius: var(--radius); padding: 14px 16px;
  display: flex; align-items: center; gap: 13px;
  cursor: pointer; transition: all .18s; margin-bottom: 9px;
  box-shadow: var(--card-shadow);
}
.member-card:hover { box-shadow: 0 4px 20px rgba(59,122,255,0.12); border-color: rgba(59,122,255,0.2); transform: translateY(-1px); }
.member-card:active { transform: scale(0.98); box-shadow: var(--card-shadow); }
.avatar-circle {
  width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 800; color: #fff;
  border: 2.5px solid rgba(255,255,255,0.6);
  box-shadow: 0 3px 12px rgba(0,0,0,0.18);
  overflow: hidden; position: relative;
}
.avatar-circle img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; border-radius: 50%; }
.member-info { flex: 1; min-width: 0; }
.member-name { font-size: 14px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.member-en { font-size: 12px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.member-pos { font-size: 11px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 3px; }
.member-meta { display: flex; align-items: flex-end; flex-direction: column; gap: 5px; flex-shrink: 0; }
.regional-badge { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px; letter-spacing: 0.5px; }
.r1 { background: rgba(239,68,68,0.1); color: var(--r1); }
.r2 { background: rgba(59,122,255,0.1); color: var(--r2); }
.r3 { background: rgba(16,185,129,0.12); color: var(--r3); }
.r4 { background: rgba(245,158,11,0.12); color: var(--r4); }
.rsoa-tag { font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 10px; background: rgba(249,115,22,0.1); color: var(--orange); }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 600px;
  background: rgba(255,255,255,0.95); backdrop-filter: blur(20px);
  border-top: 1px solid var(--card-border);
  box-shadow: 0 -4px 20px rgba(80,100,160,0.08);
  display: flex; z-index: 100;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 10px 4px 8px; cursor: pointer; background: none; border: none;
  color: var(--text3); transition: color .2s; font-family: var(--font);
}
.nav-item.active { color: var(--accent); }
.nav-item svg { width: 22px; height: 22px; }
.nav-item span { font-size: 10px; font-weight: 700; }

/* ── MODAL ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(30,40,80,0.45); backdrop-filter: blur(6px); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal-sheet {
  width: 100%; max-width: 560px; max-height: 92vh; overflow-y: auto;
  background: #fff;
  border-radius: 24px 24px 0 0;
  border: 1px solid var(--card-border);
  border-bottom: none;
  box-shadow: 0 -8px 40px rgba(59,80,160,0.15);
  -webkit-overflow-scrolling: touch;
}
.modal-sheet::-webkit-scrollbar { display: none; }
.modal-header-band {
  height: 100px;
  background: linear-gradient(135deg, #eef3ff, #f3eeff);
  border-radius: 24px 24px 0 0; position: relative; flex-shrink: 0;
  border-bottom: 1px solid var(--card-border);
}
.modal-close {
  position: absolute; top: 14px; right: 14px; width: 32px; height: 32px;
  border-radius: 50%; background: rgba(255,255,255,0.9); border: 1px solid var(--card-border);
  color: var(--text2); font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
.modal-avatar-wrap { display: flex; justify-content: center; margin-top: -44px; margin-bottom: 10px; }
.modal-avatar {
  width: 88px; height: 88px; border-radius: 50%;
  border: 3.5px solid #fff;
  overflow: hidden; display: flex; align-items: center; justify-content: center;
  font-size: 28px; font-weight: 800; color: #fff;
  box-shadow: 0 6px 24px rgba(0,0,0,0.15); position: relative; cursor: pointer;
}
.modal-avatar img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
.avatar-edit-overlay { position: absolute; bottom: 0; left: 0; right: 0; height: 36%; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; font-size: 14px; }
.modal-name { text-align: center; font-size: 20px; font-weight: 900; padding: 0 24px; color: var(--text); }
.modal-en { text-align: center; font-size: 13px; color: var(--text2); margin-top: 3px; }
.modal-pos { text-align: center; font-size: 12px; color: var(--accent); margin-top: 6px; font-weight: 600; padding: 0 20px; }
.modal-badges { display: flex; justify-content: center; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
.info-list { padding: 20px 24px; display: flex; flex-direction: column; gap: 2px; }
.info-row { display: flex; gap: 12px; align-items: flex-start; padding: 11px 0; border-bottom: 1px solid #f1f5fb; }
.info-icon { font-size: 18px; width: 26px; text-align: center; flex-shrink: 0; margin-top: 2px; }
.info-label { font-size: 11px; color: var(--text3); margin-bottom: 2px; font-weight: 600; letter-spacing: 0.3px; }
.info-val { font-size: 14px; font-weight: 600; color: var(--text); }
.info-val a { color: var(--accent); text-decoration: none; }
.modal-actions { padding: 16px 24px 32px; display: flex; gap: 10px; }
.btn-call {
  flex: 1; padding: 13px; border-radius: 13px; border: none;
  background: linear-gradient(135deg, #10b981, #059669);
  color: #fff; font-weight: 700; font-size: 14px; cursor: pointer; font-family: var(--font);
  display: flex; align-items: center; justify-content: center; gap: 6px;
  box-shadow: 0 3px 12px rgba(16,185,129,0.3);
}
.btn-mail {
  flex: 1; padding: 13px; border-radius: 13px;
  border: 1.5px solid var(--card-border);
  background: var(--bg); color: var(--text2);
  font-weight: 700; font-size: 14px; cursor: pointer; font-family: var(--font);
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: background .18s;
}
.btn-mail:active { background: var(--bg3); }

/* ── PHOTO UPLOAD PROGRESS ── */
.upload-progress {
  background: rgba(59,122,255,0.06); border: 1px solid rgba(59,122,255,0.2);
  border-radius: 12px; padding: 12px 16px; margin: 0 24px 12px; display: none;
}
.upload-bar-wrap { height: 4px; background: #e9edf7; border-radius: 2px; margin-top: 8px; overflow: hidden; }
.upload-bar { height: 100%; background: linear-gradient(90deg, #3b7aff, #6c5ce7); border-radius: 2px; width: 0%; transition: width .3s; }
.upload-label { font-size: 12px; color: var(--accent); font-weight: 600; }

/* ── SYNC INDICATOR ── */
.sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 5px; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.5; transform:scale(0.85); } }
.sync-off { background: #ef4444; animation: none; }

/* ── FORM ── */
.form-sheet { padding: 24px 24px 32px; }
.form-title { font-size: 18px; font-weight: 800; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; color: var(--text); }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 12px; }
.field { margin-bottom: 13px; }
.field label { display: block; font-size: 11px; font-weight: 700; color: var(--text2); margin-bottom: 5px; letter-spacing: 0.4px; }
.field input, .field select {
  width: 100%; padding: 10px 13px; border-radius: 11px;
  border: 1.5px solid var(--card-border);
  background: var(--bg); color: var(--text); font-size: 14px; font-family: var(--font);
  outline: none; transition: border-color .2s, box-shadow .2s;
}
.field input:focus, .field select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,122,255,0.1); }
.field select option { background: #fff; color: var(--text); }
.field.full { grid-column: 1/-1; }
.form-btns { display: flex; gap: 10px; margin-top: 6px; }
.btn-save {
  flex: 2; padding: 13px; border-radius: 13px; border: none;
  background: linear-gradient(135deg, #3b7aff, #6c5ce7); color: #fff;
  font-weight: 700; font-size: 15px; cursor: pointer; font-family: var(--font);
  box-shadow: 0 3px 14px rgba(59,122,255,0.3);
}
.btn-cancel {
  flex: 1; padding: 13px; border-radius: 13px;
  border: 1.5px solid var(--card-border); background: var(--bg);
  color: var(--text2); font-size: 14px; cursor: pointer; font-family: var(--font);
}
.btn-delete {
  padding: 13px 18px; border-radius: 13px;
  border: 1.5px solid rgba(239,68,68,0.25); background: rgba(239,68,68,0.06);
  color: #ef4444; font-size: 14px; cursor: pointer; font-family: var(--font);
}

/* ── PROFILE ── */
.profile-wrap { padding: 16px; }
.profile-hero {
  background: linear-gradient(135deg, #eef3ff 0%, #f3eeff 100%);
  border: 1px solid var(--card-border);
  border-radius: 20px; padding: 28px 20px; text-align: center; margin-bottom: 16px;
  box-shadow: var(--card-shadow);
}
.profile-avatar-wrap { position: relative; width: 96px; height: 96px; margin: 0 auto 14px; cursor: pointer; }
.profile-avatar {

function getColor(id) {

}
function getInitials(thai) {
  const parts = (thai||'').replace('คุณ ','').trim().split(' ');

function getAge(birth) {
  if(!birth||birth==='-') return '';
  const p=birth.split('/'); if(p.length!==3) return '';
  const age=Math.floor((Date.now()-new Date(+p[2]-543,+p[1]-1,+p[0]))/(365.25*24*3600*1000));
  return isNaN(age)?'':`(อายุ ${age} ปี)`;
}

// ═══════════════════════════════════════════════
// FIREBASE SYNC — Realtime Database
// ═══════════════════════════════════════════════
function isFbReady() { return window._fbReady === true; }

// Seed ข้อมูลเริ่มต้นถ้า Database ว่างเปล่า
async function seedFirestore() {
  if (!isFbReady()) return;
  const existing = await window._fb.getMembers();
  if (existing.length > 0) return; // มีข้อมูลแล้ว ไม่ต้อง seed
  for (const m of INITIAL_MEMBERS) {
    await window._fb.setMember(m.id, m);
  }
  console.log('✅ Seeded Realtime DB with', INITIAL_MEMBERS.length, 'members');
}

// Real-time listener — อัปเดตทุกอุปกรณ์ทันที
function startFirebaseListener() {
  if (!isFbReady()) return;
  const unsub = window._fb.onMembers(updated => {
    if (updated.length > 0) {
      members = updated;
      saveLocal();
      if (currentTab === 'members') {
        if (document.getElementById('memberList')) renderMemberList();
        else renderMembers();
      }
      if (currentDetailId) {
        const m = members.find(x => x.id === currentDetailId);
        if (m) updateDetailAvatar(m);
      }
    }
  });
  fbListeners.push(unsub);
  setTopSync(true, 'Sync แบบ Real-time ✅');
}

function stopFirebaseListeners() {
  fbListeners.forEach(u => u());
  fbListeners = [];
  if (userAvatarListener) { userAvatarListener(); userAvatarListener = null; }
}

// ═══════════════════════════════════════════════

function startUserAvatarListener() {
  if (!isFbReady() || !currentUser) return;
  userAvatarListener = window._fb.onUserAvatar(currentUser.username, url => {
    currentUserAvatar = url;
    renderTopAvatar();
    if (currentTab === 'profile') renderProfile();
  });
}

async function saveUserAvatar(base64) {
  if (!isFbReady() || !currentUser) return;
  await window._fb.setUserAvatar(currentUser.username, base64);
}

async function handleProfileAvatarUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';

  const progWrap = document.getElementById('profileUploadProgress');
  const progBar  = document.getElementById('profileUploadBar');
  const progLbl  = document.getElementById('profileUploadLabel');
  if (progWrap) { progWrap.style.display='block'; progBar.style.width='10%'; progLbl.textContent='กำลังบีบอัดรูป...'; }

  try {
    // บีบอัดให้เล็ก 300px / quality 0.7 → ~20-40KB
    const base64 = await compressImage(file, 300, 0.7);
    if(progBar) progBar.style.width='60%';
    if(progLbl) progLbl.textContent='กำลังบันทึก...';

    // เซฟลง Realtime DB โดยตรง (ไม่ต้องใช้ Storage)
    if (isFbReady()) {
      await window._fb.setUserAvatar(currentUser.username, base64);
      if(progBar) progBar.style.width='100%';
      if(progLbl) progLbl.textContent='✅ sync เรียบร้อย';
      setTimeout(() => { if(progWrap) progWrap.style.display='none'; }, 1500);

// SEARCH — real-time, min 2 chars, no re-render of shell
// ═══════════════════════════════════════════════
function handleSearchInput(val) {
  searchInputVal = val;
  clearTimeout(searchDebounceTimer);

  // Update hint text without touching the input element
  const hint = document.getElementById('searchHint');
  const badge = document.getElementById('searchBadge');
  const clearBtn = document.getElementById('searchClearBtn');
  if (clearBtn) clearBtn.style.display = val ? 'block' : 'none';

  if (val.length === 0) {
    searchQ = '';
    if (hint) { hint.style.display = 'none'; }
    if (badge) { badge.style.display = 'none'; }
    renderMemberList();
    return;
  }
  if (val.length === 1) {
    if (hint) { hint.style.display = 'flex'; }
    if (badge) { badge.style.display = 'none'; }
    // Don't filter yet
    return;
  }
  // 2+ chars: debounce 300ms
  if (hint) { hint.style.display = 'none'; }
  searchDebounceTimer = setTimeout(() => {
    searchQ = val;
    renderMemberList();
    // update badge
    const b = document.getElementById('searchBadge');
    const filtered = getFiltered();
    if (b) {
      b.style.display = 'flex';
      b.innerHTML = `<span>🔍</span> ค้นหา "<strong>${searchQ}</strong>" — พบ ${filtered.length} คน`;
    }
    // update stats search count if visible
    const statSearch = document.getElementById('statSearch');
    if (statSearch) statSearch.textContent = filtered.length;
  }, 300);
}

function clearSearch() {
  searchInputVal = '';
  searchQ = '';
  clearTimeout(searchDebounceTimer);
  const inp = document.getElementById('searchInput');
  if (inp) { inp.value = ''; inp.focus(); }
  const hint = document.getElementById('searchHint');
  const badge = document.getElementById('searchBadge');
  const clearBtn = document.getElementById('searchClearBtn');
  if (hint) hint.style.display = 'none';
  if (badge) badge.style.display = 'none';
  if (clearBtn) clearBtn.style.display = 'none';
  renderMemberList();
  const statSearch = document.getElementById('statSearch');
  if (statSearch) statSearch.textContent = members.filter(m=> filterRegional==='all'||m.regional===+filterRegional).length;
}

function getFiltered() {
  return members.filter(m=>{
    const matchR = filterRegional==='all' || m.regional===+filterRegional;
    const q = searchQ.toLowerCase();
    const matchQ = !q || [m.thai,m.eng,m.nick,m.phone,m.email,m.plate,m.pos].join(' ').toLowerCase().includes(q);
    return matchR && matchQ;
  });
}

async function handleAvatarUpload(event) {
  const file = event.target.files[0];
  if(!file || !currentDetailId) return;
  event.target.value = '';

  const m = members.find(x => x.id === currentDetailId);
  if(!m) return;

  const progress = document.getElementById('uploadProgress');
  const bar      = document.getElementById('uploadBar');
  const label    = document.getElementById('uploadLabel');
  progress.style.display = 'block';
  bar.style.width = '10%';
  label.textContent = 'กำลังบีบอัดรูป...';

  try {
    // บีบอัดให้เล็ก 300px / quality 0.7 → ~20-40KB
    const base64 = await compressImage(file, 300, 0.7);
    bar.style.width = '60%';
    label.textContent = 'กำลังบันทึก...';

    if (isFbReady()) {
      await window._fb.setMemberAvatar(currentDetailId, base64);
      bar.style.width = '100%';
      label.textContent = '✅ sync เรียบร้อย';
      setTimeout(() => { progress.style.display = 'none'; }, 1500);
      showToast('✅ เปลี่ยนรูปโปรไฟล์เรียบร้อย — sync ทุกอุปกรณ์แล้ว');
    } else {
      // Local fallback
      members = members.map(x => x.id === currentDetailId ? {...x, avatar: base64} : x);
      saveLocal();
      bar.style.width = '100%';
      updateDetailAvatar(members.find(x => x.id === currentDetailId));
      if(currentTab === 'members') renderMemberList();
      setTimeout(() => { progress.style.display = 'none'; }, 1200);
      showToast('✅ เปลี่ยนรูปแล้ว (บันทึกในเครื่องนี้เท่านั้น)');
    }
  } catch(e) {
    console.error(e);
    progress.style.display = 'none';
    showToast('❌ เกิดข้อผิดพลาด: ' + e.message, true);
  }
}

function compressImage(file, maxDim, quality) {
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width, h=img.height;
        if(w>maxDim||h>maxDim){
          if(w>h){h=Math.round(h*maxDim/w);w=maxDim;}
          else{w=Math.round(w*maxDim/h);h=maxDim;}
        }
        const canvas=document.createElement('canvas');
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',quality));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function saveMember() {
  const thai=document.getElementById('fThai').value.trim();
  if(!thai){showToast('⚠️ กรุณากรอกชื่อ-สกุล');return;}
  const data={
    thai, eng:document.getElementById('fEng').value.trim(),
    nick:document.getElementById('fNick').value.trim(),
    regional:+document.getElementById('fRegional').value,
    pos:document.getElementById('fPos').value.trim(),
    phone:document.getElementById('fPhone').value.trim(),
    email:document.getElementById('fEmail').value.trim(),
    birth:document.getElementById('fBirth').value.trim(),
    carType:document.getElementById('fCarType').value.trim(),
    plate:document.getElementById('fPlate').value.trim(),
    isRSOA:document.getElementById('fPos').value.includes('Regional Store'),
  };
  if(editingId) {
    const existing=members.find(m=>m.id===editingId);
    const updated={...existing,...data};
    members=members.map(m=>m.id===editingId?updated:m);
    saveLocal();
    if(isFbReady()) await writeToFirestore(editingId, data);
    showToast('✅ แก้ไขข้อมูลเรียบร้อย'+(isFbReady()?' — sync แล้ว':''));
  } else {
    const newId='m'+Date.now();
    const newM={...data, id:newId, avatar:null};
    members.push(newM);
    saveLocal();
    if(isFbReady()) await writeToFirestore(newId, newM);
    showToast('✅ เพิ่มสมาชิกใหม่เรียบร้อย'+(isFbReady()?' — sync แล้ว':''));
  }
  closeModal('formModal');
  renderMembers();
}

async function deleteMember() {
  if(!confirm('ยืนยันการลบสมาชิกนี้?')) return;
  members=members.filter(m=>m.id!==editingId);
  saveLocal();
  if(isFbReady()) await deleteFromFirestore(editingId);
  closeModal('formModal');
  showToast('🗑️ ลบสมาชิกเรียบร้อย');
  renderMembers();
}

  const avatarHTML = currentUserAvatar
    ? `<img src="${currentUserAvatar}" style="width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;border-radius:50%">`
    : `<span style="position:relative;z-index:1">${currentUser.username.slice(0,2).toUpperCase()}</span>`;

  el.innerHTML=`
    <div class="profile-wrap">
      <div class="profile-hero">
        <div class="profile-avatar-wrap" onclick="document.getElementById('profileFileInput').click()" title="เปลี่ยนรูปโปรไฟล์">
          <div class="profile-avatar" style="background:${bgGrad}">
            ${avatarHTML}
          </div>
          <div class="profile-avatar-edit">📷</div>
        </div>
        <input type="file" id="profileFileInput" accept="image/*" style="display:none" onchange="handleProfileAvatarUpload(event)">

        <div id="profileUploadProgress" style="display:none;margin:10px auto 0;max-width:260px;background:rgba(59,122,255,0.08);border:1px solid rgba(59,122,255,0.2);border-radius:12px;padding:10px 14px">
          <div id="profileUploadLabel" style="font-size:12px;color:var(--accent);font-weight:600"></div>
          <div style="height:4px;background:#e9edf7;border-radius:2px;margin-top:8px;overflow:hidden">
            <div id="profileUploadBar" style="height:100%;background:linear-gradient(90deg,#3b7aff,#6c5ce7);border-radius:2px;width:0%;transition:width .3s"></div>
          </div>
        </div>

        <div style="font-size:20px;font-weight:900;margin-top:4px;color:var(--text)">${currentUser.username.toUpperCase()}</div>
        <div style="font-size:12px;color:var(--text3);margin-top:4px">แตะรูปเพื่อเปลี่ยนโปรไฟล์</div>
        <div style="margin-top:10px">
          <span style="background:${role==='admin'?'rgba(249,115,22,0.12)':'rgba(59,122,255,0.1)'};color:${role==='admin'?'var(--orange)':'var(--accent)'};padding:4px 16px;border-radius:20px;font-size:12px;font-weight:700;border:1px solid ${role==='admin'?'rgba(249,115,22,0.2)':'rgba(59,122,255,0.2)'}">
            ${role==='admin'?'👑 ADMIN':'👤 USER'}
          </span>
        </div>
      </div>

      <div style="background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:14px 16px;margin-bottom:12px;box-shadow:var(--card-shadow)">
        <div style="font-size:12px;color:var(--text2);font-weight:600;margin-bottom:8px">🔥 สถานะ Firebase</div>
        <div style="display:flex;align-items:center;gap:8px;font-size:13px">
          <span class="sync-dot ${isFbReady()?'':'sync-off'}"></span>
          <span style="color:${isFbReady()?'#2edfa3':'#ff4d6d'}">${isFbReady()?'เชื่อมต่อแล้ว — รูปโปรไฟล์ sync ทุกอุปกรณ์':'ยังไม่ได้ตั้งค่า Firebase — เปิดไฟล์ HTML เพื่อตั้งค่า'}</span>
        </div>
      </div>

      ${role==='admin'?`
      <div style="background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:16px 20px;margin-bottom:12px;box-shadow:var(--card-shadow)">
        <div style="font-size:13px;color:var(--text2);font-weight:600;margin-bottom:12px">📊 สรุปข้อมูลระบบ</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div style="text-align:center;padding:12px;background:var(--bg);border-radius:12px;border:1px solid var(--card-border)">
            <div style="font-size:28px;font-weight:900;color:var(--accent)">${members.length}</div>
            <div style="font-size:11px;color:var(--text3)">สมาชิกทั้งหมด</div>
          </div>
          <div style="text-align:center;padding:12px;background:var(--bg);border-radius:12px;border:1px solid var(--card-border)">
            <div style="font-size:28px;font-weight:900;color:var(--orange)">${members.filter(m=>m.isRSOA).length}</div>
            <div style="font-size:11px;color:var(--text3)">Regional Lead</div>
          </div>
        </div>
      </div>`:''}

      <button onclick="doLogout()" style="width:100%;padding:13px;border-radius:14px;border:1.5px solid rgba(239,68,68,0.25);background:rgba(239,68,68,0.06);color:#ef4444;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font);margin-top:4px">
        🚪 ออกจากระบบ
      </button>
    </div>`;
}

function doLogout() {
  stopFirebaseListeners();
  currentUser=null;
  currentUserAvatar=null;
  document.getElementById('appScreen').classList.remove('active');
  document.getElementById('loginScreen').classList.add('active');
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
  document.getElementById('loginError').style.display='none';
  document.getElementById('btnAdd').style.display='none';
}

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
function closeModal(id) { document.getElementById(id).classList.remove('show'); if(id==='detailModal') currentDetailId=null; }
function showToast(msg,err=false) {
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.background=err?'rgba(239,68,68,0.92)':'rgba(16,185,129,0.92)';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

document.querySelectorAll('.modal-overlay').forEach(o=>{
  o.addEventListener('click',e=>{ if(e.target===o) o.classList.remove('show'); });
});


</script>
</body>
</html>
