<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a1e">
<title>Team Directory System</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<!-- ════════════════════════════════════════════════════════════════════
  🔥 FIREBASE SETUP
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  ขั้นตอนการติดตั้ง Firebase (ฟรี ทำครั้งเดียว ~10 นาที):

  1. ไปที่ https://console.firebase.google.com
  2. คลิก "Add project" → ตั้งชื่อ เช่น "team-directory"
  3. ปิด Google Analytics → "Create project"
  4. ใน project ให้คลิก </> (Web app) → ตั้งชื่อ → "Register app"
  5. คัดลอก firebaseConfig ที่ได้ มาแทนที่ด้านล่าง
  6. ไปที่ Build → Firestore Database → "Create database"
     → เลือก "Start in test mode" → เลือก location ใกล้สุด (asia-southeast1)
  7. ไปที่ Build → Storage → "Get started" → "Start in test mode"
  8. เสร็จ! ทุกอุปกรณ์จะ sync รูปกันแบบ real-time

  ⚠️ แทนที่ค่าด้านล่างด้วย config ของคุณ:
════════════════════════════════════════════════════════════════════ -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

// ══════════ 🔧 แก้ไขค่าเหล่านี้ด้วย Firebase config ของคุณ ══════════
const firebaseConfig = {
  apiKey:            "YOUR_API_KEY",
  authDomain:        "YOUR_PROJECT_ID.firebaseapp.com",
  projectId:         "YOUR_PROJECT_ID",
  storageBucket:     "YOUR_PROJECT_ID.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId:             "YOUR_APP_ID"
};
// ═══════════════════════════════════════════════════════════════════

const FIREBASE_CONFIGURED = firebaseConfig.apiKey !== "YOUR_API_KEY";

let db, storage;

if (FIREBASE_CONFIGURED) {
  try {
    const app = initializeApp(firebaseConfig);
    db      = getFirestore(app);
    storage = getStorage(app);
    window._fb = { db, storage, doc, setDoc, getDoc, onSnapshot, collection, getDocs, ref, uploadBytes, getDownloadURL };
    window._fbReady = true;
    console.log("✅ Firebase connected");
  } catch(e) {
    console.error("Firebase init error:", e);
    window._fbReady = false;
  }
} else {
  window._fbReady = false;
  console.warn("⚠️ Firebase not configured — running in local mode");
}
</script>

<style>
:root {
  --bg:#0a0a1e; --bg2:#10102a; --bg3:#16163a;
  --card:rgba(255,255,255,0.05); --card-border:rgba(255,255,255,0.09);
  --accent:#4f8aff; --accent2:#7b5fff; --orange:#ff7b35; --green:#2edfa3;
  --text:#f0f0ff; --text2:rgba(240,240,255,0.55); --text3:rgba(240,240,255,0.3);
  --r1:#ff4d6d; --r2:#4f8aff; --r3:#2edfa3; --r4:#ffb347;
  --font:'Noto Sans Thai','Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow-x:hidden}
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}

/* ── LOGIN ── */
#loginScreen{
  background:radial-gradient(ellipse at 30% 20%,rgba(79,138,255,0.18) 0%,transparent 60%),
             radial-gradient(ellipse at 80% 80%,rgba(123,95,255,0.15) 0%,transparent 60%),var(--bg);
  align-items:center;justify-content:center;padding:24px;
}
.login-card{width:100%;max-width:400px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:40px 32px;backdrop-filter:blur(20px);box-shadow:0 24px 80px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.08)}
.login-logo{width:72px;height:72px;border-radius:20px;margin:0 auto 20px;background:linear-gradient(135deg,#4f8aff,#7b5fff);display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 8px 32px rgba(79,138,255,0.4)}
.login-title{font-size:22px;font-weight:800;text-align:center;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:32px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;letter-spacing:0.5px;text-transform:uppercase}
.form-group input{width:100%;padding:12px 16px;border-radius:12px;border:1.5px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.07);color:var(--text);font-size:15px;font-family:var(--font);outline:none;transition:border-color .2s}
.form-group input:focus{border-color:var(--accent)}
.btn-login{width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,#4f8aff,#7b5fff);color:#fff;font-weight:700;font-size:15px;cursor:pointer;font-family:var(--font);margin-top:8px;box-shadow:0 4px 20px rgba(79,138,255,0.4);transition:opacity .2s,transform .1s}
.btn-login:active{transform:scale(0.98);opacity:0.9}
.login-error{background:rgba(255,77,109,0.15);border:1px solid rgba(255,77,109,0.3);border-radius:10px;padding:10px 14px;font-size:13px;color:#ff4d6d;margin-top:12px;display:none}
.firebase-notice{background:rgba(255,179,71,0.1);border:1px solid rgba(255,179,71,0.25);border-radius:10px;padding:10px 14px;font-size:12px;color:#ffb347;margin-top:12px;display:none;line-height:1.5}

/* ── APP ── */
#appScreen{background:var(--bg)}
.topbar{background:rgba(10,10,30,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--card-border);padding:14px 20px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-shrink:0}
.topbar-left{display:flex;flex-direction:column;gap:1px}
.topbar-title{font-size:17px;font-weight:800;letter-spacing:0.3px}
.topbar-sub{font-size:11px;color:var(--text2)}
.topbar-right{display:flex;align-items:center;gap:10px}
.btn-add{background:linear-gradient(135deg,#4f8aff,#7b5fff);border:none;border-radius:20px;color:#fff;font-weight:700;font-size:12px;padding:6px 14px;cursor:pointer;font-family:var(--font);display:flex;align-items:center;gap:4px}
.avatar-sm{width:36px;height:36px;border-radius:50%;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;overflow:hidden}
.avatar-sm img{width:100%;height:100%;object-fit:cover}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;padding:16px 16px 80px;-webkit-overflow-scrolling:touch}
.content::-webkit-scrollbar{display:none}

/* ── SEARCH + FILTER ── */
.search-wrap{background:rgba(255,255,255,0.06);border:1px solid var(--card-border);border-radius:14px;padding:10px 14px;display:flex;align-items:center;gap:8px;margin-bottom:12px}
.search-wrap svg{opacity:.45;flex-shrink:0}
.search-wrap input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:14px;font-family:var(--font)}
.search-wrap input::placeholder{color:var(--text3)}
.filter-pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px}
.filter-pills::-webkit-scrollbar{display:none}
.pill{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;border:1.5px solid rgba(255,255,255,0.12);background:transparent;color:var(--text2);transition:all .2s;font-family:var(--font)}
.pill.active{background:rgba(79,138,255,0.2);border-color:var(--accent);color:var(--accent)}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.stat-card{background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:10px 6px;text-align:center}
.stat-icon{font-size:18px}.stat-val{font-size:20px;font-weight:900;color:var(--accent)}.stat-lbl{font-size:9px;color:var(--text3);margin-top:1px;line-height:1.2}

/* ── MEMBER CARD ── */
.member-card{background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:13px;cursor:pointer;transition:background .18s,transform .12s;margin-bottom:9px}
.member-card:active{transform:scale(0.98);background:rgba(255,255,255,0.09)}
.avatar-circle{width:52px;height:52px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;border:2.5px solid rgba(255,255,255,0.2);box-shadow:0 4px 14px rgba(0,0,0,0.35);overflow:hidden;position:relative;background-size:cover;background-position:center}
.avatar-circle img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;border-radius:50%}
.member-info{flex:1;min-width:0}
.member-name{font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.member-en{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.member-pos{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px}
.member-meta{display:flex;align-items:flex-end;flex-direction:column;gap:5px;flex-shrink:0}
.regional-badge{font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;letter-spacing:0.5px}
.r1{background:rgba(255,77,109,0.18);color:var(--r1)}.r2{background:rgba(79,138,255,0.18);color:var(--r2)}.r3{background:rgba(46,223,163,0.18);color:var(--r3)}.r4{background:rgba(255,179,71,0.18);color:var(--r4)}
.rsoa-tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;background:rgba(255,123,53,0.2);color:var(--orange)}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:600px;background:rgba(8,8,24,0.96);backdrop-filter:blur(20px);border-top:1px solid var(--card-border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 8px;cursor:pointer;background:none;border:none;color:var(--text3);transition:color .2s;font-family:var(--font)}
.nav-item.active{color:var(--accent)}
.nav-item svg{width:22px;height:22px}
.nav-item span{font-size:10px;font-weight:600}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.72);backdrop-filter:blur(5px);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal-sheet{width:100%;max-width:560px;max-height:92vh;overflow-y:auto;background:linear-gradient(180deg,var(--bg3),var(--bg2));border-radius:24px 24px 0 0;border:1px solid var(--card-border);-webkit-overflow-scrolling:touch}
.modal-sheet::-webkit-scrollbar{display:none}
.modal-header-band{height:100px;background:linear-gradient(135deg,rgba(79,138,255,0.25),rgba(123,95,255,0.2));border-radius:24px 24px 0 0;position:relative;flex-shrink:0}
.modal-close{position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-avatar-wrap{display:flex;justify-content:center;margin-top:-44px;margin-bottom:10px}
.modal-avatar{width:88px;height:88px;border-radius:50%;border:3.5px solid var(--bg2);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#fff;box-shadow:0 8px 28px rgba(0,0,0,0.5);position:relative;cursor:pointer}
.modal-avatar img{width:100%;height:100%;object-fit:cover;position:absolute}
.avatar-edit-overlay{position:absolute;bottom:0;left:0;right:0;height:36%;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;font-size:14px}
.modal-name{text-align:center;font-size:20px;font-weight:900;padding:0 24px}
.modal-en{text-align:center;font-size:13px;color:var(--text2);margin-top:3px}
.modal-pos{text-align:center;font-size:12px;color:var(--accent);margin-top:6px;font-weight:600;padding:0 20px}
.modal-badges{display:flex;justify-content:center;gap:8px;margin-top:8px;flex-wrap:wrap}
.info-list{padding:20px 24px;display:flex;flex-direction:column;gap:2px}
.info-row{display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.info-icon{font-size:18px;width:26px;text-align:center;flex-shrink:0;margin-top:2px}
.info-label{font-size:11px;color:var(--text3);margin-bottom:2px;font-weight:600;letter-spacing:0.3px}
.info-val{font-size:14px;font-weight:600;color:var(--text)}
.info-val a{color:var(--accent);text-decoration:none}
.modal-actions{padding:16px 24px 32px;display:flex;gap:10px}
.btn-call{flex:1;padding:13px;border-radius:13px;border:none;background:linear-gradient(135deg,#2edfa3,#1bbf87);color:#fff;font-weight:700;font-size:14px;cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:6px}
.btn-mail{flex:1;padding:13px;border-radius:13px;border:1.5px solid rgba(255,255,255,0.15);background:transparent;color:var(--text);font-weight:700;font-size:14px;cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:6px}

/* ── PHOTO UPLOAD PROGRESS ── */
.upload-progress{background:rgba(79,138,255,0.15);border:1px solid rgba(79,138,255,0.3);border-radius:12px;padding:12px 16px;margin:0 24px 12px;display:none}
.upload-bar-wrap{height:4px;background:rgba(255,255,255,0.1);border-radius:2px;margin-top:8px;overflow:hidden}
.upload-bar{height:100%;background:linear-gradient(90deg,#4f8aff,#7b5fff);border-radius:2px;width:0%;transition:width .3s}
.upload-label{font-size:12px;color:var(--accent);font-weight:600}

/* ── SYNC INDICATOR ── */
.sync-dot{width:8px;height:8px;border-radius:50%;background:#2edfa3;display:inline-block;margin-right:5px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.85)}}
.sync-off{background:#ff4d6d;animation:none}

/* ── FORM ── */
.form-sheet{padding:24px 24px 32px}
.form-title{font-size:18px;font-weight:800;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 12px}
.field{margin-bottom:13px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;letter-spacing:0.3px}
.field input,.field select{width:100%;padding:10px 13px;border-radius:11px;border:1.5px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.06);color:var(--text);font-size:14px;font-family:var(--font);outline:none;transition:border-color .2s}
.field input:focus,.field select:focus{border-color:var(--accent)}
.field select option{background:#1a1a3e}
.field.full{grid-column:1/-1}
.form-btns{display:flex;gap:10px;margin-top:6px}
.btn-save{flex:2;padding:13px;border-radius:13px;border:none;background:linear-gradient(135deg,#4f8aff,#7b5fff);color:#fff;font-weight:700;font-size:15px;cursor:pointer;font-family:var(--font)}
.btn-cancel{flex:1;padding:13px;border-radius:13px;border:1.5px solid rgba(255,255,255,0.15);background:transparent;color:var(--text2);font-size:14px;cursor:pointer;font-family:var(--font)}
.btn-delete{padding:13px 18px;border-radius:13px;border:1.5px solid rgba(255,77,109,0.3);background:rgba(255,77,109,0.1);color:var(--r1);font-size:14px;cursor:pointer;font-family:var(--font)}

/* ── PROFILE ── */
.profile-wrap{padding:16px}
.profile-hero{background:linear-gradient(135deg,rgba(79,138,255,0.2),rgba(123,95,255,0.2));border:1px solid var(--card-border);border-radius:20px;padding:28px 20px;text-align:center;margin-bottom:16px}
.profile-avatar-wrap{position:relative;width:96px;height:96px;margin:0 auto 14px;cursor:pointer}
.profile-avatar{width:96px;height:96px;border-radius:50%;border:3px solid rgba(255,255,255,0.2);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:800;color:#fff;box-shadow:0 8px 28px rgba(0,0,0,0.5);position:relative}
.profile-avatar img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0}
.profile-avatar-edit{position:absolute;bottom:0;right:0;width:28px;height:28px;border-radius:50%;background:var(--accent);border:2.5px solid var(--bg2);display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.4)}
.avatar-sm img{width:100%;height:100%;object-fit:cover;border-radius:50%}

/* ── EMPTY / TOAST / SPINNER ── */
.empty{text-align:center;padding:48px 20px;color:var(--text3);font-size:14px}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-80px);background:rgba(46,223,163,0.9);color:#fff;font-weight:700;padding:10px 22px;border-radius:24px;font-size:14px;font-family:var(--font);z-index:999;transition:transform .3s;pointer-events:none;backdrop-filter:blur(10px)}
.toast.show{transform:translateX(-50%) translateY(0)}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- ─── LOGIN ─── -->
<div id="loginScreen" class="screen active">
  <div class="login-card">
    <div class="login-logo">📋</div>
    <div class="login-title">Team Directory</div>
    <div class="login-sub">Store Operations Audit — cpaxtra.co.th</div>
    <div id="syncStatus" style="display:none;text-align:center;margin-bottom:16px;font-size:12px;color:var(--text3)">
      <span id="syncDot" class="sync-dot"></span><span id="syncLabel">เชื่อมต่อ Firebase...</span>
    </div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="loginUser" placeholder="กรอกชื่อผู้ใช้" autocomplete="username" autocapitalize="none">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="กรอกรหัสผ่าน" autocomplete="current-password">
    </div>
    <button class="btn-login" id="btnLogin" onclick="doLogin()">เข้าสู่ระบบ</button>
    <div id="loginError" class="login-error">⚠️ ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง</div>
    <div id="firebaseNotice" class="firebase-notice">
      ⚠️ Firebase ยังไม่ได้ตั้งค่า — ทำงานในโหมด local<br>
      รูปโปรไฟล์จะไม่ sync ระหว่างอุปกรณ์<br>
      <a href="https://console.firebase.google.com" target="_blank" style="color:#ffb347">คลิกที่นี่เพื่อตั้งค่า Firebase →</a>
    </div>
  </div>
</div>

<!-- ─── APP ─── -->
<div id="appScreen" class="screen">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-title">📋 Team Directory</div>
      <div class="topbar-sub" id="topbarSub">
        <span id="topSyncDot" class="sync-dot sync-off"></span>
        <span id="topSyncLabel">Local mode</span>
      </div>
    </div>
    <div class="topbar-right">
      <button class="btn-add" id="btnAdd" onclick="openAddForm()" style="display:none">＋ เพิ่ม</button>
      <div class="avatar-sm" id="topAvatar" onclick="switchTab('profile')"></div>
    </div>
  </div>
  <div class="content" id="mainContent"></div>

function getColor(id) {
  const n = parseInt(String(id).replace(/\D/g,'')) || 0;
  return COLORS[n % COLORS.length];
}
function getInitials(thai) {
  const parts = (thai||'').replace('คุณ ','').trim().split(' ');
  return ((parts[0]||'').charAt(0) + (parts[1]||'').charAt(0)).toUpperCase() || '?';
}
function saveLocal() { localStorage.setItem('tds_members', JSON.stringify(members)); }
function getAge(birth) {
  if(!birth||birth==='-') return '';
  const p=birth.split('/'); if(p.length!==3) return '';
  const age=Math.floor((Date.now()-new Date(+p[2]-543,+p[1]-1,+p[0]))/(365.25*24*3600*1000));
  return isNaN(age)?'':`(อายุ ${age} ปี)`;
}

// ═══════════════════════════════════════════════
// FIREBASE SYNC
// ═══════════════════════════════════════════════
function isFbReady() { return window._fbReady === true; }

// Push all initial members to Firestore if not yet seeded
async function seedFirestore() {
  if (!isFbReady()) return;
  const {db, collection, getDocs, doc, setDoc} = window._fb;
  const snap = await getDocs(collection(db,'members'));
  if (!snap.empty) return; // already seeded
  for (const m of INITIAL_MEMBERS) {
    await setDoc(doc(db,'members',m.id), m);
  }
  console.log('✅ Seeded Firestore with', INITIAL_MEMBERS.length, 'members');
}

// Real-time listener — updates local array and re-renders
function startFirebaseListener() {
  if (!isFbReady()) return;
  const {db, collection, onSnapshot} = window._fb;
  const unsub = onSnapshot(collection(db,'members'), snap => {
    const updated = [];
    snap.forEach(d => updated.push(d.data()));
    if (updated.length > 0) {
      updated.sort((a,b)=>String(a.id).localeCompare(String(b.id)));
      members = updated;
      saveLocal();
      if (currentTab==='members') renderMembers();
      // update detail modal if open
      if (currentDetailId) {
        const m = members.find(x=>x.id===currentDetailId);
        if (m) updateDetailAvatar(m);
      }
    }
  }, err => {
    console.error('Firestore listener error:', err);
    setTopSync(false, 'Firebase error');
  });
  fbListeners.push(unsub);
  setTopSync(true, 'Sync แบบ Real-time');
}

function stopFirebaseListeners() { fbListeners.forEach(u=>u()); fbListeners=[]; if(userAvatarListener){userAvatarListener();userAvatarListener=null;} }

// ═══════════════════════════════════════════════
// USER PROFILE PHOTO (users collection)
// ═══════════════════════════════════════════════
function startUserAvatarListener() {
  if (!isFbReady() || !currentUser) return;
  const {db, doc, onSnapshot} = window._fb;
  const unsub = onSnapshot(doc(db, 'users', currentUser.username), snap => {
    const data = snap.exists() ? snap.data() : {};
    currentUserAvatar = data.avatar || null;
    renderTopAvatar();
    // re-render profile tab if open
    if (currentTab === 'profile') renderProfile();
  }, err => console.error('User avatar listener error:', err));
  userAvatarListener = unsub;
}

async function saveUserAvatar(url) {
  if (!isFbReady() || !currentUser) return;
  const {db, doc, setDoc} = window._fb;
  await setDoc(doc(db, 'users', currentUser.username), { avatar: url, updatedAt: Date.now() }, { merge: true });
}

async function handleProfileAvatarUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';

  const compressed = await compressImage(file, 800, 0.78);

  const progWrap = document.getElementById('profileUploadProgress');
  const progBar  = document.getElementById('profileUploadBar');
  const progLbl  = document.getElementById('profileUploadLabel');
  if (progWrap) { progWrap.style.display='block'; progBar.style.width='0%'; progLbl.textContent='กำลังบีบอัดรูป...'; }

  if (isFbReady()) {
    try {
      if(progLbl) progLbl.textContent='กำลังอัปโหลดไปยัง Cloud...';
      if(progBar) progBar.style.width='30%';
      const {storage, ref, uploadBytes, getDownloadURL} = window._fb;
      const storageRef = ref(storage, `user_avatars/${currentUser.username}_${Date.now()}.jpg`);
      const blob = await fetch(compressed).then(r=>r.blob());
      if(progBar) progBar.style.width='60%';
      await uploadBytes(storageRef, blob);
      if(progBar) progBar.style.width='85%';
      const url = await getDownloadURL(storageRef);
      if(progBar) progBar.style.width='95%';
      await saveUserAvatar(url);
      if(progBar) progBar.style.width='100%';
      if(progLbl) progLbl.textContent='✅ sync เรียบร้อย';
      setTimeout(()=>{ if(progWrap) progWrap.style.display='none'; }, 1800);
      showToast('✅ เปลี่ยนรูปโปรไฟล์เรียบร้อย — sync ทุกอุปกรณ์แล้ว');
    } catch(e) {
      console.error(e);
      if(progWrap) progWrap.style.display='none';
      showToast('❌ อัปโหลดล้มเหลว: '+e.message, true);
    }
  } else {
    // Local fallback
    currentUserAvatar = compressed;
    localStorage.setItem('tds_user_avatar_' + currentUser.username, compressed);
    renderTopAvatar();
    if(progWrap) progWrap.style.display='none';
    if(currentTab==='profile') renderProfile();
    showToast('✅ เปลี่ยนรูปแล้ว (บันทึกในเครื่องนี้เท่านั้น)');
  }
}

function setTopSync(ok, label) {

function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  const acc = ACCOUNTS.find(a=>a.username===u && a.password===p);
  if (!acc) { document.getElementById('loginError').style.display='block'; return; }
  currentUser = acc;
  document.getElementById('loginScreen').classList.remove('active');
  document.getElementById('appScreen').classList.add('active');
  if (acc.role==='admin') document.getElementById('btnAdd').style.display='flex';
  // Load local fallback avatar first
  currentUserAvatar = localStorage.getItem('tds_user_avatar_' + acc.username) || null;
  renderTopAvatar();
  if (isFbReady()) {
    seedFirestore().then(()=>startFirebaseListener());
    startUserAvatarListener();
    setTopSync(true,'Sync แบบ Real-time');
  } else {
    setTopSync(false,'Local mode');
  }
  switchTab('members');
}

    document.getElementById('nav-'+t)?.classList.toggle('active',t===tab);
  });
  if(tab==='members') renderMembers();
  else renderProfile();
}

      <button class="pill ${filterRegional==='4'?'active':''}" onclick="filterRegional='4';renderMembers()">Regional 4 (${counts[3]})</button>

      : `<div class="avatar-circle" style="background:${getColor(m.id)}">${getInitials(m.thai)}</div>`;

function updateDetailAvatar(m) {
  const av = document.getElementById('detailAvatar');
  if(!av) return;
  av.style.background = getColor(m.id);
  // remove old image if any
  const oldImg = av.querySelector('img');
  if(oldImg) oldImg.remove();
  if(m.avatar) {
    const img=document.createElement('img');
    img.src=m.avatar; img.style.cssText='position:absolute;width:100%;height:100%;object-fit:cover;border-radius:50%';
    av.insertBefore(img, av.firstChild);
  } else {
    const txt = av.querySelector('.av-initials');
    if(!txt) {
      const span=document.createElement('span');
      span.className='av-initials'; span.textContent=getInitials(m.thai);
      av.insertBefore(span, av.firstChild);
    }
  }
  if(!m.avatar) {
    const old=av.querySelector('.av-initials');
    if(!old){const s=document.createElement('span');s.className='av-initials';s.textContent=getInitials(m.thai);av.insertBefore(s,av.firstChild);}
  } else {
    const old=av.querySelector('.av-initials'); if(old) old.remove();
  }
}

// ═══════════════════════════════════════════════
// PHOTO UPLOAD
// ═══════════════════════════════════════════════
function triggerAvatarUpload() {
  document.getElementById('avatarFileInput').click();
}

async function handleAvatarUpload(event) {
  const file = event.target.files[0];
  if(!file||!currentDetailId) return;
  event.target.value=''; // reset

  const m = members.find(x=>x.id===currentDetailId);
  if(!m) return;

  // compress image to max 800px & ~150KB
  const compressed = await compressImage(file, 800, 0.75);

  const progress = document.getElementById('uploadProgress');
  const bar = document.getElementById('uploadBar');
  const label = document.getElementById('uploadLabel');
  progress.style.display='block';
  bar.style.width='0%';
  label.textContent='กำลังบีบอัดรูป...';

  if(isFbReady()) {
    // Upload to Firebase Storage
    try {
      label.textContent='กำลังอัปโหลดไปยัง Cloud...';
      bar.style.width='30%';
      const {storage, ref, uploadBytes, getDownloadURL} = window._fb;
      const storageRef = ref(storage, `avatars/${currentDetailId}_${Date.now()}.jpg`);
      const blob = await fetch(compressed).then(r=>r.blob());
      bar.style.width='60%';
      await uploadBytes(storageRef, blob);
      bar.style.width='85%';
      const url = await getDownloadURL(storageRef);
      bar.style.width='95%';
      // Save URL to Firestore — listener will update all devices
      await writeToFirestore(currentDetailId, { avatar: url });
      bar.style.width='100%';
      label.textContent='✅ อัปโหลดสำเร็จ — กำลัง sync...';
      setTimeout(()=>{ progress.style.display='none'; }, 2000);
      showToast('✅ เปลี่ยนรูปโปรไฟล์เรียบร้อย — sync ทุกอุปกรณ์แล้ว');
    } catch(e) {
      console.error(e);
      progress.style.display='none';
      showToast('❌ อัปโหลดล้มเหลว: '+e.message);
    }
  } else {
    // Local fallback — store base64
    label.textContent='บันทึกในเครื่อง...';
    bar.style.width='80%';
    members = members.map(x=>x.id===currentDetailId ? {...x,avatar:compressed} : x);
    saveLocal();
    bar.style.width='100%';
    updateDetailAvatar(members.find(x=>x.id===currentDetailId));
    if(currentTab==='members') renderMembers();
    setTimeout(()=>{ progress.style.display='none'; }, 1200);
    showToast('✅ เปลี่ยนรูปแล้ว (บันทึกในเครื่องนี้เท่านั้น)');
  }
}

function compressImage(file, maxDim, quality) {
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width, h=img.height;
        if(w>maxDim||h>maxDim){
          if(w>h){h=Math.round(h*maxDim/w);w=maxDim;}
          else{w=Math.round(w*maxDim/h);h=maxDim;}
        }
        const canvas=document.createElement('canvas');
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',quality));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function saveMember() {
  const thai=document.getElementById('fThai').value.trim();
  if(!thai){showToast('⚠️ กรุณากรอกชื่อ-สกุล');return;}
  const data={
    thai, eng:document.getElementById('fEng').value.trim(),
    nick:document.getElementById('fNick').value.trim(),
    regional:+document.getElementById('fRegional').value,
    pos:document.getElementById('fPos').value.trim(),
    phone:document.getElementById('fPhone').value.trim(),
    email:document.getElementById('fEmail').value.trim(),
    birth:document.getElementById('fBirth').value.trim(),
    carType:document.getElementById('fCarType').value.trim(),
    plate:document.getElementById('fPlate').value.trim(),
    isRSOA:document.getElementById('fPos').value.includes('Regional Store'),
  };
  if(editingId) {
    const existing=members.find(m=>m.id===editingId);
    const updated={...existing,...data};
    members=members.map(m=>m.id===editingId?updated:m);
    saveLocal();
    if(isFbReady()) await writeToFirestore(editingId, data);
    showToast('✅ แก้ไขข้อมูลเรียบร้อย'+(isFbReady()?' — sync แล้ว':''));
  } else {
    const newId='m'+Date.now();
    const newM={...data, id:newId, avatar:null};
    members.push(newM);
    saveLocal();
    if(isFbReady()) await writeToFirestore(newId, newM);
    showToast('✅ เพิ่มสมาชิกใหม่เรียบร้อย'+(isFbReady()?' — sync แล้ว':''));
  }
  closeModal('formModal');
  renderMembers();
}

async function deleteMember() {
  if(!confirm('ยืนยันการลบสมาชิกนี้?')) return;
  members=members.filter(m=>m.id!==editingId);
  saveLocal();
  if(isFbReady()) await deleteFromFirestore(editingId);
  closeModal('formModal');
  showToast('🗑️ ลบสมาชิกเรียบร้อย');
  renderMembers();
}
